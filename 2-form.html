<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Feedback Form</title>
  <script type="module" crossorigin src="/goit-js-hw-09/2-form.js"></script>
  <link rel="modulepreload" crossorigin href="/goit-js-hw-09/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="stylesheet" crossorigin href="/goit-js-hw-09/assets/styles-Bfrf6Ai_.css">
</head>
<body>
  <h2>form</h2>

  <form class="feedback-form" autocomplete="off">
    <label>
      Email
      <input type="email" name="email" autofocus />
    </label>
    <label>
      Message
      <textarea name="message" rows="8"></textarea>
    </label>
    <button type="submit">Submit</button>
  </form>

  <h2>states</h2>

  <form class="feedback-states" autocomplete="off">

    <div class="label-states"> 
    <label class="label-normal">
      Email
      <input type="email" name="email" autofocus />
    </label>

    <p>normal</p>
    </div>

    <div class="label-states">
    <label class="label-hover">
      Email
      <input type="email" name="email" autofocus />
    </label>

    <p>hover</p>
    </div>

    <div class="label-states"> 
    <label class="label-active">
      Email
      <input type="email" name="email" autofocus />
    </label>

    <p>active</p>
    </div>
    
    <div class="btn-normal"> 
    <button type="submit">Submit</button>

    <p>normal</p>
    </div>

    <div class="btn-hover"> 
    <button type="submit">Submit</button> 

    <p>hover</p>
    </div>
  </form>


</body>
</html>
